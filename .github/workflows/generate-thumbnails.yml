name: Generate Thumbnails

on:
  push:
    paths:
      - 'images/**'
      - 'photos.yaml'

jobs:
  thumbnails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Generate missing thumbnails
        run: |
          cd images
          for img in *.jpg *.jpeg *.png; do
            [ -f "$img" ] || continue
            # Skip existing thumbnails and non-photo files
            case "$img" in thumb_*|face_bg*) continue;; esac
            thumb="thumb_${img}"
            if [ ! -f "$thumb" ] || [ "$img" -nt "$thumb" ]; then
              echo "Generating thumbnail for $img"
              convert "$img" -thumbnail 96x96^ -gravity center -extent 96x96 -quality 80 "$thumb"
            fi
          done

      - name: Commit thumbnails
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/thumb_*
          if git diff --cached --quiet; then
            echo "No new thumbnails to commit"
          else
            git commit -m "Auto-generate thumbnails"
            git push
          fi
